<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Recuperar contraseña</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="header">
    <h1>Recuperar contraseña</h1>
    <p>Introduce tu email y te enviaremos un enlace para crear una nueva contraseña.</p>
  </header>

  <main class="main-container" style="grid-template-columns: 1fr;">
    <section class="panel panel-input" style="max-width: 520px; margin: 0 auto;">
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="tuemail@ejemplo.com" autocomplete="email" />
        <p class="mini-note">Introduce el email con el que creaste tu cuenta.</p>
      </div>

      <button id="send-btn" class="btn btn-primary">Enviar enlace</button>
      <p id="status-msg" class="status-msg"></p>

      <p style="margin-top: 12px; font-size: 14px;">
        <a href="./login.html">Volver al login</a>
      </p>
    </section>
  </main>

  <script src="./config.js"></script>
  <script src="./theme-init.js"></script>
  <script src="./forgot-password.js"></script>
</body>
</html>
