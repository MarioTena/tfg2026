<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Nueva contraseña</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="header">
    <h1>Nueva contraseña</h1>
    <p>Introduce tu nueva contraseña para volver a acceder a tu cuenta.</p>
  </header>

  <main class="main-container" style="grid-template-columns: 1fr;">
    <section class="panel panel-input" style="max-width: 520px; margin: 0 auto;">
      <div class="field">
        <label for="password">Nueva contraseña</label>
        <input id="password" type="password" placeholder="Escribe tu nueva contraseña" autocomplete="new-password" />
        <p class="mini-note">Debe tener al menos 6 caracteres.</p>
      </div>

      <button id="reset-btn" class="btn btn-primary">Guardar contraseña</button>
      <p id="status-msg" class="status-msg"></p>

      <p style="margin-top: 12px; font-size: 14px;">
        <a href="./login.html">Volver al login</a>
      </p>
    </section>
  </main>

  <script src="./config.js"></script>
  <script src="./theme-init.js"></script>
  <script src="./reset-password.js"></script>
</body>
</html>
