<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>TFG - Registro</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="header">
    <h1>Registro</h1>
    <p>Crea tu cuenta para empezar.</p>
  </header>

  <main class="main-container" style="grid-template-columns: 1fr;">
    <section class="panel panel-input" style="max-width: 520px; margin: 0 auto;">
      <h2>Crear cuenta</h2>

      <div class="field">
        <label for="name">Nombre</label>
        <input id="name" type="text" placeholder="Mario" autocomplete="name" />
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="tuemail@ejemplo.com" autocomplete="email" />
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <input id="password" type="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password" />
      </div>

     <button id="register-btn" class="btn btn-primary">Crear cuenta</button>

      <p id="status-msg" class="status-msg"></p>

      <p style="margin-top: 12px; font-size: 14px;">
        ¿Ya tienes cuenta? <a href="./login.html">Inicia sesión</a>
      </p>
    </section>
  </main>

  <script src="./register.js"></script>
</body>
</html>
